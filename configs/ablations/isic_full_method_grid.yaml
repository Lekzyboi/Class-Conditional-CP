# Full ISIC method-grid config.
# Inputs are archived calibration/test probability arrays.
# Baseline summary config:
# configs/isic_resnet50_baseline.yaml
name: isic_resnet50_full_method_grid
alpha_values: [0.05, 0.10, 0.20]
methods: [standard_cp, aps, raps, mondrian_cp, frequency_grouped_cp]
paths:
  calibration_probs: assets/output/framework_inputs/isic_calibration_probs.npy
  calibration_labels: assets/output/framework_inputs/isic_calibration_labels.npy
  test_probs: assets/output/framework_inputs/isic_test_probs.npy
  test_labels: assets/output/framework_inputs/isic_test_labels.npy
  framework_output_dir: assets/output/framework_runs/isic_resnet50_full_method_grid
metadata:
  split_seed: 42
  status: requires_archived_probability_arrays
  class_names: [AK, BCC, BKL, DF, MEL, NV, SCC, VASC]
  high_prevalence_classes: [NV]
  low_prevalence_classes: [DF, SCC, VASC]
  train_frequencies: [867, 3323, 2624, 238, 4522, 12874, 628, 253]

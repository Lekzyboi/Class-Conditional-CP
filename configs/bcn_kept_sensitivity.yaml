# Overlap-aware BCN sensitivity analysis.
#
# This uses ISIC calibration arrays and evaluates the existing checkpoint on
# non-overlapping, mappable BCN kept images. It must not be described as
# independent external validation.
name: bcn_kept_overlap_aware_sensitivity
alpha_values: [0.05, 0.10, 0.20]
methods: [standard_cp, aps, raps, mondrian_cp, frequency_grouped_cp]
paths:
  calibration_probs: assets/output/framework_inputs/isic_calibration_probs.npy
  calibration_labels: assets/output/framework_inputs/isic_calibration_labels.npy
  test_probs: assets/output/framework_inputs/bcn_kept_probs.npy
  test_labels: assets/output/framework_inputs/bcn_kept_labels.npy
  framework_output_dir: assets/output/framework_runs/bcn_kept_overlap_aware_sensitivity
metadata:
  interpretation: partial identifier-overlap sensitivity analysis, not independent external validation
  split_seed: 42
  bootstrap_seed: 42
  n_bootstrap: 1000
  bootstrap_confidence: 0.95
  p_value_adjustment: holm
  class_names: [AK, BCC, BKL, DF, MEL, NV, SCC, VASC]
  high_prevalence_classes: [NV]
  low_prevalence_classes: [DF, SCC, VASC]
  train_frequencies: [867, 3323, 2624, 238, 4522, 12874, 628, 253]
